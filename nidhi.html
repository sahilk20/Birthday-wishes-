<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Nidhi ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');
        body { margin: 0; background: #00050a; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Poppins', sans-serif; }
        
        #main-stage { text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .star { font-size: 100px; animation: float 3s infinite; display: inline-block; filter: drop-shadow(0 0 20px gold); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .hint { margin-top: 20px; color: gold; letter-spacing: 2px; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #card { 
            display: none; width: 85%; max-width: 400px; padding: 30px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border: 2px solid rgba(241, 196, 15, 0.4); text-align: center;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.2);
            animation: crystallize 1s ease-out;
        }
        @keyframes crystallize { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: gold; margin: 0; }
        .btn { background: gold; border: none; padding: 15px; color: black; border-radius: 50px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .float { position: absolute; bottom: -50px; animation: fly 5s linear infinite; }
        @keyframes fly { to { transform: translateY(-115vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-stage" onclick="openNidhi()">
        <div class="star">💫</div>
        <div class="hint">NIDHI, TAP THE STAR! 🌟</div>
    </div>

    <div id="card">
        <h1>Happy Birthday, Nidhi!</h1>
        <p>May your year be as bright as the stars! ✨</p>
        <button class="btn" onclick="document.getElementById('song').play()">🎵 PLAY MUSIC 🎵</button>
    </div>

    <audio id="song" loop preload="auto">
        <source src="https://actions.google.com/config/en/resources/media/music/happy_birthday.mp3" type="audio/mpeg">
    </audio>

    <script>
        function openNidhi() {
            const a = document.getElementById('song');
            a.play().catch(() => {});
            document.getElementById('main-stage').style.display = 'none';
            document.getElementById('card').style.display = 'block';
            setInterval(() => {
                const b = document.createElement('div'); b.className='float';
                b.innerHTML = ['✨','🌟','💫','💛'][Math.floor(Math.random()*4)];
                b.style.left = Math.random()*100+'vw'; b.style.fontSize = '20px';
                document.body.appendChild(b); setTimeout(()=>b.remove(), 5000);
            }, 400);
        }
    </script>
</body>
</html>
