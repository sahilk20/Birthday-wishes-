<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Khushi ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { margin: 0; background: #050505; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .start-btn { background: #ff4d4d; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 20px #ff4d4d; }
        
        #main-content { display: none; text-align: center; }
        .candle { font-size: 100px; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #card { display: none; width: 85%; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 30px; padding: 30px; border: 1px solid #ff9a9e; animation: pop 0.5s ease-out; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        h1 { font-family: 'Dancing Script', cursive; color: #ff9a9e; font-size: 3rem; margin: 10px 0; }
        .balloon { position: absolute; bottom: -50px; animation: fly 5s linear infinite; }
        @keyframes fly { to { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="color: #ff9a9e;">SURPRISE FOR KHUSHI!</h2>
        <p>Please tap the button below to start the magic with music 🎶</p>
        <button class="start-btn" onclick="unlockAudio()">OPEN SURPRISE</button>
    </div>

    <div id="main-content">
        <div id="candle-div" onclick="blowOut()">
            <div class="candle">🕯️</div>
            <p style="color: #ff9a9e; font-weight: bold;">TAP TO BLOW & WISH!</p>
        </div>

        <div id="card">
            <h1>Happy Birthday, Khushi!</h1>
            <p>You make the world brighter! 💖</p>
            <p style="font-size: 0.8rem; color: #aaa;">(Music is playing! Check volume/silent switch)</p>
        </div>
    </div>

    <audio id="song" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/11/22/audio_feb6312693.mp3" type="audio/mpeg">
    </audio>

    <script>
        const s = document.getElementById('song');
        
        function unlockAudio() {
            // Force start audio (muted first then unmuted is a common bypass)
            s.play().then(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }).catch(e => {
                // If it fails, we still move forward but show a message
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            });
        }

        function blowOut() {
            document.getElementById('candle-div').style.display = 'none';
            document.getElementById('card').style.display = 'block';
            s.play(); // Play again just to be sure
            setInterval(() => {
                const b = document.createElement('div'); b.className='balloon';
                b.innerHTML = ['🎈','💖','✨'][Math.floor(Math.random()*3)];
                b.style.left = Math.random()*100+'vw'; b.style.fontSize = '30px';
                document.body.appendChild(b); setTimeout(()=>b.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
