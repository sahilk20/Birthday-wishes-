<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Khushi ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');
        body { margin: 0; background: #0b0d17; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Poppins', sans-serif; }
        
        /* Direct Candle View */
        #main-stage { text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .candle { font-size: 100px; position: relative; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .hint { margin-top: 20px; color: #ff9a9e; font-weight: bold; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* Elegant Wish Card */
        #card { 
            display: none; width: 85%; max-width: 400px; padding: 30px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 154, 158, 0.3); text-align: center;
            box-shadow: 0 0 50px rgba(255, 154, 158, 0.2);
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #ff9a9e; margin: 0; }
        .btn { background: #ff4d4d; border: none; padding: 15px; color: white; border-radius: 50px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .float { position: absolute; bottom: -50px; animation: fly 5s linear infinite; }
        @keyframes fly { to { transform: translateY(-115vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-stage" onclick="openSurprise()">
        <div class="candle">🕯️</div>
        <div class="hint">KHUSHI, TAP TO BLOW & WISH! 🎂</div>
    </div>

    <div id="card">
        <h1>Happy Birthday, Khushi!</h1>
        <p>Wishing you a day as beautiful as your smile! ✨</p>
        <button class="btn" onclick="document.getElementById('song').play()">🎵 PLAY MUSIC 🎵</button>
    </div>

    <audio id="song" loop preload="auto">
        <source src="https://actions.google.com/config/en/resources/media/music/happy_birthday.mp3" type="audio/mpeg">
    </audio>

    <script>
        function openSurprise() {
            const a = document.getElementById('song');
            a.play().catch(() => {}); // Try to play music on first tap
            document.getElementById('main-stage').style.display = 'none';
            document.getElementById('card').style.display = 'block';
            setInterval(() => {
                const b = document.createElement('div'); b.className='float';
                b.innerHTML = ['🎈','💖','✨','🌸'][Math.floor(Math.random()*4)];
                b.style.left = Math.random()*100+'vw'; b.style.fontSize = '25px';
                document.body.appendChild(b); setTimeout(()=>b.remove(), 5000);
            }, 400);
        }
    </script>
</body>
</html>
