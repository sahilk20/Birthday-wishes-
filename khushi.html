<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make a Wish, Khushi!</title>
    <style>
        body { margin: 0; background: #0b0d17; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        /* Realistic Candle CSS */
        .holder { position: relative; width: 150px; height: 300px; text-align: center; user-select: none; -webkit-user-select: none; }
        .candle { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 180px; background: linear-gradient(#ff9a9e, #ff4d4d); border-radius: 10px 10px 5px 5px; box-shadow: inset 5px 0 15px rgba(0,0,0,0.2); }
        .thread { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 4px; height: 15px; background: #333; }
        
        .flame { 
            position: absolute; top: -70px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 60px; background: orange; border-radius: 50% 50% 35% 35%;
            box-shadow: 0 0 30px 10px rgba(255, 165, 0, 0.6);
            animation: flicker 0.1s infinite alternate; transition: transform 0.5s, opacity 0.5s;
        }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.1) rotate(2deg); } }
        
        .instruction { position: absolute; top: 320px; width: 250px; left: 50%; transform: translateX(-50%); color: #ff9a9e; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.1; } }

        /* The Surprise Card */
        #card { 
            display: none; width: 88%; background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            padding: 30px 15px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9);
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        h1 { color: #ff9a9e; font-size: 2rem; margin: 10px 0; }
        .btn { background: #ff4d4d; border: none; padding: 15px; color: white; border-radius: 50px; width: 100%; font-weight: bold; margin-top: 15px; box-shadow: 0 10px 20px rgba(255,77,77,0.4); }
        .heart { position: absolute; pointer-events: none; animation: fly 4s linear infinite; bottom: -50px; }
        @keyframes fly { to { transform: translateY(-115vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="candle-section" class="holder" onmousedown="startBlow()" ontouchstart="startBlow()" onmouseup="stopBlow()" ontouchend="stopBlow()">
        <div class="candle">
            <div class="thread"></div>
            <div id="flame" class="flame"></div>
        </div>
        <div class="instruction">PRESS & HOLD FLAME TO BLOW OUT</div>
    </div>

    <div id="card">
        <span style="font-size: 50px;">🎂</span>
        <h1>Happy Birthday, Khushi!</h1>
        <p>Wishing you a day as bright as your smile!</p>
        <button class="btn" onclick="playMusic()">🎵 PLAY BIRTHDAY MUSIC 🎵</button>
    </div>

    <audio id="song" loop><source src="https://www.chosic.com/wp-content/uploads/2021/04/Happy-Birthday-Funny-Song.mp3"></audio>

    <script>
        let timer;
        function startBlow() {
            // Shrink the flame as they hold
            document.getElementById('flame').style.transform = 'translateX(-50%) scale(0.3)';
            timer = setTimeout(() => {
                document.getElementById('flame').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('candle-section').style.display = 'none';
                    document.getElementById('card').style.display = 'block';
                    setInterval(spawnHeart, 300);
                }, 400);
            }, 1000); // 1 second hold time
        }
        function stopBlow() {
            clearTimeout(timer);
            const flame = document.getElementById('flame');
            if (flame.style.opacity !== '0') {
                flame.style.transform = 'translateX(-50%) scale(1)';
            }
        }
        function playMusic() { document.getElementById('song').play(); }
        function spawnHeart() {
            const h = document.createElement('div'); h.className='heart'; h.innerHTML='❤️';
            h.style.left=Math.random()*100+'vw'; h.style.animationDuration=(Math.random()*2+3)+'s';
            document.body.appendChild(h); setTimeout(()=>h.remove(), 5000);
        }
    </script>
</body>
</html>
