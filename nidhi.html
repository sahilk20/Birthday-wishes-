<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Nidhi ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { margin: 0; background: #000; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: sans-serif; }
        .holder { text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .wish-icon { font-size: 80px; filter: drop-shadow(0 0 20px gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .instruction { margin-top: 25px; color: gold; font-weight: bold; animation: blink 1.5s infinite; letter-spacing: 2px; }
        @keyframes blink { 50% { opacity: 0.3; } }
        #card { display: none; width: 85%; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border-radius: 25px; padding: 30px 15px; text-align: center; border: 1px solid gold; animation: crystallize 1s ease-out; }
        @keyframes crystallize { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        h1 { font-family: 'Dancing Script', cursive; color: gold; font-size: 2.5rem; }
        .btn { background: gold; border: none; padding: 15px; color: black; border-radius: 50px; width: 100%; font-weight: bold; margin-top: 20px; }
        .star { position: absolute; bottom: -50px; animation: fly 5s linear infinite; }
        @keyframes fly { to { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>
<body>
    <div id="start" class="holder" onclick="initNidhi()">
        <div class="wish-icon">💫</div>
        <div class="instruction">NIDHI, TAP TO MAKE A WISH! 🌟</div>
    </div>
    <div id="card">
        <h1>Happy Birthday, Nidhi!</h1>
        <p>May your dreams take flight today!</p>
        <button class="btn" onclick="togglePlay()">🎵 PAUSE / PLAY MUSIC 🎵</button>
    </div>
    <audio id="song" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>
    <script>
        const a = document.getElementById('song');
        function initNidhi() {
            a.play().catch(e => console.log("Blocked"));
            document.getElementById('start').style.display = 'none';
            document.getElementById('card').style.display = 'block';
            setInterval(spawn, 400);
        }
        function togglePlay() { a.paused ? a.play() : a.pause(); }
        function spawn() {
            const b = document.createElement('div'); b.className='star';
            b.innerHTML = ['✨','🌟','💫'][Math.floor(Math.random()*3)];
            b.style.left = Math.random()*100+'vw'; b.style.fontSize = '20px';
            document.body.appendChild(b); setTimeout(()=>b.remove(), 5000);
        }
    </script>
</body>
</html>
